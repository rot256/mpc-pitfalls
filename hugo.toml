baseURL = "https://mpcsec.org/"
title = "Common MPC Pitfalls"
languageCode = "en-us"
disableKinds = ["taxonomy", "term", "rss", "sitemap", "robotstxt", "404"]

[[module.mounts]]
source = "content"
target = "content"

[[module.mounts]]
source = "layouts"
target = "layouts"

[[module.mounts]]
source = "static"
target = "static"

[[module.mounts]]
source = "skill"
target = "static"

[outputs]
home = ["HTML", "llms"]
page = ["HTML"]
section = ["HTML"]

[outputFormats.llms]
mediaType = "text/plain"
baseName = "llms"
isPlainText = true

[markup.highlight]
lineNos = true
lineNumbersInTable = false
noClasses = false

[markup.goldmark.parser]
autoHeadingID = false

[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.extensions.passthrough]
enable = true

[markup.goldmark.extensions.passthrough.delimiters]
block = [['$$', '$$']]
inline = [['$', '$']]

